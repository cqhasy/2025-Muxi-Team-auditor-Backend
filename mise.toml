[tools]
go = { version = '1.24.4', os = ["linux", "macos","windows"], postinstall = "go install github.com/go-delve/delve/cmd/dlv@latest && go install gotest.tools/gotestsum@latest"}

[tasks.test]
run= "go test -v ./..."

[tasks.build]
run = "go build -o app ."

[tasks.build-prod]
run = '''
VERSION=$(git describe --tags --always)
COMMIT=$(git rev-parse --short HEAD)
go build -ldflags "-s -w" -o app-${VERSION}-${COMMIT} .
'''

[tasks.deploy]
run = '''
export VERSION=$(git rev-parse --short HEAD)
IMAGE="muxi-auditor:${VERSION}"

# 判断镜像是否存在
if docker image inspect "$IMAGE" >/dev/null 2>&1; then
  echo "✅ image exists: $IMAGE"
else
  echo "❌ image not found, building..."
  docker build -t "$IMAGE" .
fi

docker compose -f docker-compose-deploy.yml up -d
'''

[tasks.delete]
run="docker compose -f docker-compose-deploy.yml down"


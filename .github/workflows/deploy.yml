name: CD
on:
  workflow_dispatch:
  push:
    branches:
      - main
jobs:
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    if: github.repository == 'cqhasy/2025-Muxi-Team-auditor-Backend'
    steps:
      - uses: actions/checkout@v6

      - name: Login to Docker
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.ALIYUN_USERNAME }}
          password: ${{ secrets.ALIYUN_PASSWORD }}
          registry: ${{ secrets.ALIYUN_REGISTRY }}

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v3

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build And Push ( for main )
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.ALIYUN_REGISTRY }}/muxi/auditor_backend:${{ github.sha }}
            ${{ secrets.ALIYUN_REGISTRY }}/muxi/auditor_backend:latest
          file: ./Dockerfile
          build-args:
           Project_Name=muxi-auditor
           Port=12810
  deploy:
    name: Deploy To Server
    runs-on: ubuntu-latest
    if: github.repository == 'cqhasy/2025-Muxi-Team-auditor-Backend'
    needs:
      - build
    steps:
      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.SERVER_ADDR }} >> ~/.ssh/known_hosts
      - name: SSH into server and deploy
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_ADDR }} << EOF
           set -e
           cd ./muxi-auditor
           docker pull ${{ secrets.ALIYUN_REGISTRY }}/muxi/auditor_backend:latest
           docker compose -f docker-compose.yaml up -d --no-deps auditor-backend
           docker image prune -a -f
          EOF


